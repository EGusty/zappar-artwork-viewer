<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Viewer - Web AR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        .status-bar {
            background: rgba(0,0,0,0.7);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .status-indicator.active {
            background: #51cf66;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: all;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-label {
            font-size: 12px;
            color: #ccc;
        }

        input[type="range"] {
            width: 100%;
            max-width: 250px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(0,0,0,0.9);
            border-color: rgba(255,255,255,0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .error-box {
            background: rgba(255,59,48,0.9);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        .info-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-overlay">
        <div class="header">
            <div class="title">Artwork Viewer AR</div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="status-bar">
            <div class="status-text">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Inicializando...</span>
            </div>
        </div>

        <div class="controls">
            <div class="slider-group">
                <label class="slider-label">Escala: <span id="scaleValue">1.0</span>x</label>
                <input type="range" id="scaleSlider" min="0.3" max="3" step="0.1" value="1">
            </div>

            <div class="button-group">
                <button id="resetBtn">↻ Reset</button>
                <button id="captureBtn">📷 Capturar</button>
            </div>

            <div class="info-text">
                💡 Apunta a una pared y toca para colocar el arte
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
